<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 70">
  <!-- Finer Build Construction favicon — icon mark only -->
  <!-- Matches the brand logo: two overlapping angled house shapes -->

  <!-- Left house (slightly transparent, behind) -->
  <polygon points="0,45 18,18 36,45" fill="#1e293b" opacity="0.7"/>
  <polygon points="0,45 36,45 36,68 0,68" fill="#1e293b" opacity="0.65"/>

  <!-- Right house (solid, in front, angled) -->
  <polygon points="28,40 50,14 72,30 50,45" fill="#1e293b"/>
  <polygon points="28,40 50,45 50,68 28,68" fill="#1e293b" opacity="0.9"/>
  <polygon points="50,45 72,30 72,58 50,68" fill="#1e293b" opacity="0.8"/>

  <!-- Small door on left house -->
  <rect x="12" y="52" width="8" height="16" fill="white"/>

  <!-- Small window on right house -->
  <rect x="55" y="40" width="7" height="7" fill="white" opacity="0.7"/>
</svg>
