name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Build finer-build
        run: pnpm --filter @workspace/finer-build build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: /Finer-build-construction-Website/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/finer-build/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
